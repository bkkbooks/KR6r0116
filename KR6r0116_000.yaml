front:
  text: 夫含氣有生無不有識有識而有行隨行善惡而受其報如農夫之播植隨所植而收之此蓋物之常理固無所可疑也上智達其本源知而無見下愚暗其蹤迹迷而不返皆絶言也中品之人未能自達隨緣動見逐見生疑疑見多端各懷異執釋典論其分別凡有六十二見邪倒於是乎生者也臨在中人之後幸而寤其萬一比見衆人不信因果者説見雖多同謂善惡無報無報之説略有三種一者自然故無因果唯當任欲待事而已二者滅盡言死而身滅識無所住身識都盡誰受苦樂以無受故知無因果三者無報言見今人有修道德貧賤則早死或行凶惡富貴靈長以是事故知無因果臨竊謂儒書論善惡之報甚多近者報於當時中者報於纍年之外遠者報於子孫之後當時報者若楚子吞蛭痼疾皆愈宋公不禱妖星多退𧨳齒凶逆旋踵伏誅趙高惑亂俄而滅族之類是也纍年報者如魏顆嫁妾終以濟師孫叔埋蛇竟享多福漢幽鴆如意蒼苟成災齊殺彭生立豕而崇之類是也子孫報者若弗父恭於三命廣宣尼之道鄧訓歲活千人遺和熹之慶陳平陰計自知無後欒黶忲侈盈被其殃之類是也若乃虞舜以孝行登位周文以仁賢受命桀紂以殘忍亡國幽厲以淫縱禍終三代功德下祚長久秦皇驕暴及子而滅若斯之比觸類實繁雖復大小有殊亦皆善惡之驗但事法王道理關天命常談之際非所宜言今之所録蓋直取其微細驗冀以發起同類貽告子孫徵於人鬼之間若斯而已也釋氏説教無非因果因即是作果即是報無一法而非因無一因而不報然其説報亦有三種一者現報於此身中作善惡業即於此身而受報者皆名現報二者生報謂此身作業不即受之隨業善惡生於諸道皆名生報三者後報謂過去身作善惡業能得果報應多身受是以現在作業未便受報或次後後生受或五生十生方始受之是皆名後報於此三報攝一切法無所不盡是今諸見復然大寤然今俗士尚有惑之多習因而忘果疑耳而信目是以聞説後報則若存若亡見有效驗則驚嗟信服昔晉高士謝敷宋尚書令傅高太子中書舍人報演齊司徒事中郎陸果或一時令望或當代名家並録觀世音應驗記及齊竟陵王蕭子良作宣驗記王琰作冥祥記皆所以徵明善惡勸戒將來實使聞者深心感寤臨既慕其風旨亦思以勸人輒録所聞集為此記仍具陳所受及聞見由緣言不飾文事專揚確庶後人見者能留意焉隨京師大德沙門釋信行本相州法藏寺僧初其母無子久以為憂有沙門過之勸念觀世音菩薩母日夜祈念頃之有娠生信行幼而聰慧博學經論識達過人以為佛所説經務於濟度或隨根性指人示道或逐時宜因事判法今去聖久遠根時久異若以下人修行上法法不當根容能錯倒乃鈔集經論參驗人法所當學者為三十六卷名曰人集録開皇初左僕射齊公聞其盛名奏文帝徵詣京師住公所造真寂寺信行又據經律録出三階法四卷其大旨勸人普敬認惡本觀佛性當病授藥頓教一乘自天下勇猛精進之士皆宗之信行嘗頭陀乞食六時禮拜勞力定心空形實智而已每坐禪説法常見青衣童子四人持花立侍嘗與徒衆在堂中坐禪衆人忽聞奇香光照堂內相共怪異咨問信行信行令問弟子僧雍惠如雍曰向見化佛從空中來至禪師前摩頂授記如云亦摩雍頂授記餘狀與雍説同後雍典其徒衆隱太白山一旦謂衆僧曰當與師等還京衆敬雍皆從之即下山夜宿武功未明便發謂衆曰師等努力今暝必須入城日沒至漕上聞鼓音歎曰城門閉矣遂宿於逆旅至昏時悲泣曰無所及矣衆問其故不答明早入城至真寂寺而信行昨夜昏時氣絶寺僧怪問雍來答曰在山遙見多人持香花幡蓋從西來入開遠門向真寂寺雍疑禪師欲去故來也昨夜昏時見禪師導從西去顧與雍別故知不及也初京城諸師有疑信行法者至是相與議據付法藏經若人通身過去聞正法故於是共觀信行頭骨兩耳正通乃皆慚悔信服初信行徒衆居京城五寺後雖侵廣今猶號五禪師老僧及臨舅説云爾京城真寂寺沙門慧如少精勤苦行師事信行信行亡後奉遵其法隋大業中因坐禪修定遂七日不動衆皆歎異之以為入三昧也既而慧如開目涕泣交流僧衆怪問之答曰火燒腳痛待視瘡畢乃説衆逾怪問慧如曰被閻羅王請行道七日滿王問須見先亡知識不如答曰欲見二人王即遣喚一人唯見龜來舐慧如足目中淚出而去更一人者云罪重不可喚令就見之使者引慧如至獄門門閉甚固使者喚守者有人應聲使者語慧如師急避道莫當門立如始避而門開大火從門流出如鍛鐵者一星迸著如腳如以被拂之舉目視門門已閉訖竟不得相見王施絹三十匹固辭不許云已遣送後房衆僧爭往後房視之則絹在床矣其腳燒瘡大如錢百餘日乃愈武德初卒真寂寺即今化度寺是也此寺臨外祖齊公所立常所遊觀每聞舅氏説云爾絳州大德沙門釋僧徹少而精練於孤山西阿造立堂宇多樹林等頗得山居形勝僧徹嘗出行山間土穴中見一癩病人瘡痍臭穢從徹乞食徹愍之呼出與歸於精舍旁為造土穴給衣食教令誦法華經此人不識文字性又頑鄙徹句句授之殊費功力然終不懈倦此人誦經向半便夢有人教之自後稍聰寤至得五六卷漸覺瘡愈比誦一部畢鬚眉平復生肥體如常而能為療疾臨嘗患腫僧徹遣此人禁呪有驗自説云然後房仁裕為秦州刺史表僧徹所立精舍為陷泉寺初此地無水僧徹常遠汲山下以自供一朝忽有陷陷處泉出故因以名陷寺也僧專以勸善為務而自修禪業遠近崇敬如父焉永徽二年正月忽屬纍徒衆自言將死既而端坐繩床閉目不動其天氣晴朗而花如雪香而不消方二里許樹葉上皆有白色如輕粉者三日乃復常色而僧徹已終至今三歲獨坐如故亦不臭懷唯目淚下云徹弟子實秦等及州人並説云爾也河東有練行尼常誦法華經訪工書者一人數倍酬直特為淨室令寫此經一起一浴燃香熏衣仍於寫經之室鑿壁通外加一竹筒令寫經人每欲出息輒遣含竹筒吐氣壁外寫經一卷八年乃畢供養嚴重盡其恭敬龍門僧法端常集大衆講法華經以此尼經本精定遣人請之尼固辭不與法端責讓之尼不得已乃自送付法端等開讀唯見黃紙了無文字更開餘卷皆悉如此法端等慚懼即送還尼尼悲泣受以香水洗函沐浴頂戴繞佛行道於七日七夜不暫休息既而開視文字如故貞觀二年法端自向臨説當具説尼名字臨忘之唯記其事云爾蒲州仁壽寺僧釋道縣少聰慧好學為州里所崇敬講涅槃八十餘遍號為精熟貞觀二年崔義直任虞卿縣令人請縣講經初發題悲泣謂衆人曰去聖遙遠微言隱絶庸愚所傳不足師範但以信心歸向自當識悟今之講説止於師子時日既沒願各在心既而講至師子一旦無疾而卒道俗驚慟義直身自徒跣送之南山之陰時十一月土地氷凍下尸於地地即生花如蓮而小頭及手足各有一花義直奇之令人夜守守者疲睡有人盜折其花明旦視之周身並有花出總五百餘莖經七日乃萎乾義直及道俗皆説云爾河東沙門釋道英少修禪行以練心為本不慎威儀然而經律奧義莫不一聞縣解遠近僧尼爭就請決英輒報謂曰汝尚未疑宜且思疑凝成然後來問問者還而思疑多固思自解而去有思而不寤重來問者英為説其機要皆喜寤而還嘗與衆人乘船黃河中流船沒衆人皆死道俗望見英沒臨河慟哭是時冬末河氷始泮兩岸猶堅英乃水中出行至岸穿氷而去岸人敬喜爭欲解衣衣之英曰體中尚熱勿覆衣也徐出而歸了無寒色視其身體如火炙處其識者以為入定故也或時為人牧牛駕車食蒜噉飯或著俗衣髮長數寸嘗至仁壽寺道懸敬安處之日晚求食懸謂曰上德雖無食相豈不為息譏嫌英笑答曰懸公心方馳驚不暫休一息而空飢餓何自苦也道懸歎服貞觀中卒法端及道俗皆説云爾幽州沙門釋智苑精練有學識隋大業中發心造石經藏之以備法滅既而於幽州北山鑿巖為石室即磨四壁而以寫經又取方石別更磨寫藏諸室內每一室滿即以石塞門用鐵錮之時隨賜帝幸涿郡內史侍郎蕭瑀皇后之同母弟也性篤信佛法以其事白后后施絹千匹餘錢物以助成之瑀亦施絹五百匹朝野聞之爭共捨施故苑得遂其功苑嘗以役匠既多道俗奔湊欲於巖前造木佛堂并食堂寢屋而念木瓦難辨恐分費經物故未能起作一夜暴雨雷電震山明旦既晴乃見山下有大松柏數千株為水所漂流積道次山東少林木松柏尤稀道俗驚駭不知來處推尋蹤迹遠自西山崩岸倒木漂送來此於是遠近歎服謂為神助苑乃使匠擇取其木餘皆分與邑里邑里喜悅而共助造堂宇頃之畢成皆如其志焉苑所造石滿七室以貞觀十三年卒弟子猶繼其功殿中丞相里玄奘大理丞采宣明等皆為臨説云爾臨以十九年從車駕幽州問鄉人亦同云爾而以軍事不得云東魏末鄴下人共入西山採銀鈔出穴未畢而穴崩有一人在後為石塞門不得出而無傷損其穴崩處有小穴不合微見日光此人自念終無理乃一心念佛其父聞子已壓無處求尸家又貧窶無以追福乃持麁飯一鉢往詣僧寺請一人齋衆僧多逐豐厚莫肯為食父持飯大哭有一僧愍之受請食訖為呪願因別去是日中其子在穴中忽於小穴明處見一沙門從穴中入來持一鉢飯以授此人食訖便不復飢唯端坐正念經十餘年齊文皇帝即位於西山造涼殿匠工除此崩石乃見穴中人尚活出之與歸父母驚喜遂闔練行雍州司馬盧承業為臨説云是著作郎降所傳之北齊時有冀州人從軍伐梁戰敗見擒為奴其父母在鄉不知音問謂以死為追福造磚浮圖磚浮圖成設齋會道俗數百人方坐食聞叩門聲主人父出視見一僧形容甚雅謂主人曰乞齋食𥞫糜可以布手巾裹之並乞鞋一量主人請留住食僧不肯曰欲早去不暇坐食也主人如其言以新布裹糜并鞋一量奉之僧受而去是日齋時主人子在江南澤中為其主牧牛忽見一僧手持糜一裹及新鞋一量至奴所問曰亦思歸見父母乎奴泣曰無敢望也僧以與糜令坐食食畢又與鞋令著之而敷袈裟於地令坐袈裟上僧取袈裟四角總把擎舉而揮之可移二丈許著地奴開視不見僧及袈裟而身已在其宅門外入門見大衆方食父母驚喜就問具説由緣視其巾內餘糜及鞋乃向奉僧者也鄉邑驚駭競為篤信是日月六日也因名所造浮圖為六日浮圖浮圖今尚邑里猶傳之矣梁武帝微時識一寒士及即位遊於苑中見牽舟帝問之尚貧賤如故敕曰明日可上謁吾當與汝縣令此人奉敕而往會故不得見頻往遇有事終不得通自怪之以問沙門寶志志方為大衆講經聽者數千人寒士不得進寶志謂衆曰有人欲來見問請開道內之衆人乃為開此人進未至寶志迎謂曰君為不得縣令來問耶終不得矣但受虛恩耳過去帝為齋主君其疏許施錢五百而竟不與是故今日但蒙許官終不得也此人聞之終去帝亦更不求之江東道俗至今傳之楊州嚴恭者本泉州人家富於財而無兄弟父母愛恭言無所違陳太建初恭年弱冠請於父母願得錢五萬往楊州市物父母從之恭乘船載錢而下去楊州數十里江中逢一船載黿將詣市賣之恭問知其故念黿當死請贖之黿主曰我黿大頭千錢乃可恭問有幾頭答有五十恭曰我正有錢五萬願以贖之黿主喜取錢付黿而去恭盡以黿放江中空船詣楊州其黿主別恭行十餘里船沒而死是日恭父母在家昏時有烏衣客五十人詣門寄宿并送錢五萬付恭父曰君兒在楊州市附此錢歸願依數受也恭父怪愕疑謂恭死因審之客曰兒無恙但不須錢故附歸耳恭父受之記是本錢而皆水濕留客為設食客止明旦辭去後月餘日恭還父母大喜既而問附錢所由恭答無之父母説客形狀及附錢月日乃贖黿之日於是知五十客皆所贖黿也父子驚歎因共往楊州起精舍專寫法華經遂徙家楊州家轉富大起房廊為寫經之室莊嚴清淨供給豐厚書生常數十人楊州道俗共相崇敬號曰嚴法華嘗有知親從從貸經錢一萬恭不獲已與之貸者受錢以船載歸中路船傾所貸之錢落水而船人不溺是日恭入錢庫見有萬濕錢如斯出水恭甚怪之後見前貸錢人乃知濕錢是所貸者又有商人至宮湖於神所祭酒食并上物其夜夢神送物還之謂曰倩君為我持此奉嚴法華以供經用也且而所上神物皆在其前於是商人歎異送達恭處而倍加厚施其後恭至市買經紙適遇少錢忽見一人持錢三千授恭曰君買紙言畢不見而錢在其前怪異如此非一隋開皇末恭死子孫傳其業隋季盜賊至江都者皆相與約勿入嚴法華里里人賴之獲全其家今寫經不已州邑共見京師人士亦多知之駙馬守國公蕭鋭最所詳審也
